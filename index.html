<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Love 💙</title>

<style>
body{margin:0;overflow:hidden;font-family:sans-serif;}
canvas{display:block;}

.controls{
 position:fixed;
 bottom:10px;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:0 20px;
}

button{
 width:65px;height:65px;border-radius:50%;
 border:none;background:#ffffffcc;font-size:20px;
}

/* OVERLAY */
.overlay{
 position:absolute;
 width:100%;height:100%;
 background:white;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 text-align:center;
 padding:20px;
}

.hidden{display:none;}

.envelope{
 width:220px;height:150px;
 background:#f5d7b2;
 border-radius:12px;
 position:relative;
}

.heart{
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 font-size:30px;
 cursor:pointer;
}

.letter{
 font-style:italic;
 max-width:300px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="overlay" class="overlay hidden"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* PLAYER */
let player={x:100,y:300,w:40,h:40,vy:0,jumping:false};
let gravity=0.8;
let level=1;
let cameraX=0;

let obstacles=[];
let flag={x:1200,y:300};

/* CONTROLES */
let keys={left:false,right:false};

left.onclick=()=>keys.left=true;
right.onclick=()=>keys.right=true;

setInterval(()=>{keys.left=false;keys.right=false},100);

jump.onclick=()=>{
 if(!player.jumping){
  player.vy=-15;
  player.jumping=true;
 }
};

/* GENERAR */
function generate(){
 obstacles=[];
 flag.x=1200;

 for(let i=1;i<7;i++){
  let type;

  if(level==1) type="bush";
  if(level==2) type=(i%2==0)?"chicken":"rabbit";
  if(level==3) type="light";

  obstacles.push({x:i*180+200,y:300,type});
 }
}

/* FONDOS */
function background(){
 if(level==1){
  ctx.fillStyle="#9be7a5"; // bosque
 }
 if(level==2){
  ctx.fillStyle="#ffb07c"; // otoño
 }
 if(level==3){
  ctx.fillStyle="#1e1e3f"; // noche
 }

 ctx.fillRect(0,0,canvas.width,canvas.height);

 // detalles
 for(let i=0;i<20;i++){
  ctx.fillStyle="pink";
  ctx.fillRect(i*100-cameraX*0.3,350,5,5);
 }
}

/* DINO PIXEL */
function drawPlayer(){
 let x=player.x-cameraX;

 ctx.fillStyle="#6ec1ff";
 ctx.fillRect(x,player.y,40,40);

 ctx.fillStyle="white";
 ctx.fillRect(x+10,player.y+10,12,12);

 ctx.fillStyle="black";
 ctx.fillRect(x+14,player.y+14,5,5);
}

/* OBSTÁCULOS */
function drawObstacles(){
 for(let o of obstacles){
  let x=o.x-cameraX;

  if(o.type=="bush"){
   ctx.fillStyle="green";
   ctx.fillRect(x,o.y,30,30);
  }

  if(o.type=="chicken"){
   ctx.fillStyle="white";
   ctx.fillRect(x,o.y,30,30);
  }

  if(o.type=="rabbit"){
   ctx.fillStyle="pink";
   ctx.fillRect(x,o.y,30,30);
  }

  if(o.type=="light"){
   ctx.fillStyle="yellow";
   ctx.fillRect(x,o.y,30,30);
  }
 }
}

/* BANDERA */
function drawFlag(){
 let x=flag.x-cameraX;
 ctx.fillStyle="red";
 ctx.fillRect(x,220,10,100);
}

/* UPDATE */
function update(){

 if(keys.left) player.x-=5;
 if(keys.right) player.x+=5;

 player.vy+=gravity;
 player.y+=player.vy;

 if(player.y>300){
  player.y=300;
  player.jumping=false;
 }

 cameraX=player.x-150;

 for(let o of obstacles){
  if(player.x<o.x+30 && player.x+40>o.x &&
     player.y<o.y+30 && player.y+40>o.y){
   alert("perdiste 😭");
   location.reload();
  }
 }

 if(player.x>flag.x){
  nextLevel();
 }
}

/* NIVELES */
function nextLevel(){
 let o=document.getElementById("overlay");
 o.classList.remove("hidden");

 if(level==1){
  o.innerHTML=`<h2>El tiempo pasa rápido... pero si estoy contigo no me molestaría mirarte hasta que el universo entero empiece a envejecer 💙<br><br>Nivel 2</h2>`;
  setTimeout(()=>{level=2;player.x=100;o.classList.add("hidden");generate();},4000);
 }

 else if(level==2){
  o.innerHTML=`<h2>ya falta poco para tu regalo, será lindo?<br><br>Nivel 3</h2>`;
  setTimeout(()=>{level=3;player.x=100;o.classList.add("hidden");generate();},4000);
 }

 else{
  final();
 }
}

/* FINAL */
function final(){
 let o=document.getElementById("overlay");
 o.classList.remove("hidden");

 o.innerHTML=`
 <button onclick="openLetter()">continuar?</button>
 <button onclick="location.reload()">salir</button>
 `;
}

/* CARTA */
function openLetter(){
 let o=document.getElementById("overlay");

 o.innerHTML=`
 <div class="envelope">
  <div class="heart" onclick="showLetter()">💌</div>
 </div>
 `;
}

function showLetter(){
 let o=document.getElementById("overlay");

 o.innerHTML=`
 <div class="letter">
 Sé que llevamos poco tiempo, pero me alegra muchísimo cumplir otro mes más a tu lado.<br><br>

 Nunca imaginé entrar a trabajar a ese lugar y salir de ahí con la persona que más amo.<br><br>

 Estar contigo se siente como una curita al corazón que alegra cada momento de mi vida.<br><br>

 Eres una persona muy bella, aunque a veces no te lo creas; bello por dentro y por fuera.<br><br>

 Si pudiera, te metería en mi bolsillo para llevarte a donde sea y cuidarte de todo lo que hay afuera.<br><br>

 No existen palabras suficientes para completar lo mucho que te amo, mi querido John.
 </div>
 `;
}

/* LOOP */
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 background();
 update();
 drawPlayer();
 drawObstacles();
 drawFlag();

 requestAnimationFrame(loop);
}

/* INIT */
generate();
loop();
</script>

</body>
</html>
