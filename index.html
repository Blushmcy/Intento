<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Love Runner 💙</title>

<style>
body{
 margin:0;
 overflow:hidden;
 font-family:'Segoe UI', sans-serif;
}

canvas{
 display:block;
}

/* CONTROLES */
.controls{
 position:fixed;
 bottom:20px;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:0 30px;
}

button{
 width:70px;
 height:70px;
 border-radius:50%;
 border:none;
 background:rgba(255,255,255,0.8);
 font-size:22px;
}

/* OVERLAY */
.overlay{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 background:rgba(255,255,255,0.9);
 text-align:center;
 padding:20px;
}

.hidden{
 display:none;
}

/* SOBRE */
.envelope{
 width:220px;
 height:150px;
 background:#f5d7b2;
 border-radius:15px;
 position:relative;
 box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.heart{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:35px;
 cursor:pointer;
}

.letter{
 max-width:320px;
 font-style:italic;
 line-height:1.6;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <button id="left">⬅️</button>
  <button id="jump">⬆️</button>
  <button id="right">➡️</button>
</div>

<div id="overlay" class="overlay hidden"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* PLAYER */
let lane = 1;
let lanes = [canvas.width*0.25, canvas.width*0.5, canvas.width*0.75];

let player = {
 y: canvas.height-150,
 vy:0,
 jumping:false
};

let speed = 6;
let obstacles = [];
let distance = 0;
let level = 1;

/* CONTROLES */
left.onclick = ()=>{ if(lane>0) lane--; }
right.onclick = ()=>{ if(lane<2) lane++; }
jump.onclick = ()=>{
 if(!player.jumping){
  player.vy=-15;
  player.jumping=true;
 }
};

/* OBSTÁCULOS */
function spawnObstacle(){
 let randomLane = Math.floor(Math.random()*3);
 obstacles.push({
  lane: randomLane,
  y:-50
 });
}

/* FONDO */
function drawBackground(){
 let grad = ctx.createLinearGradient(0,0,0,canvas.height);

 if(level==1){
  grad.addColorStop(0,"#a8edea");
  grad.addColorStop(1,"#fed6e3");
 }

 if(level==2){
  grad.addColorStop(0,"#ffd3a5");
  grad.addColorStop(1,"#fd6585");
 }

 if(level==3){
  grad.addColorStop(0,"#141e30");
  grad.addColorStop(1,"#243b55");
 }

 ctx.fillStyle=grad;
 ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* DINO */
function drawPlayer(){
 let x = lanes[lane];

 ctx.fillStyle="#6ec1ff";
 ctx.beginPath();
 ctx.roundRect(x-20, player.y, 40, 40, 12);
 ctx.fill();

 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(x+5, player.y+15, 8, 0, Math.PI*2);
 ctx.fill();

 ctx.fillStyle="black";
 ctx.beginPath();
 ctx.arc(x+7, player.y+15, 4, 0, Math.PI*2);
 ctx.fill();

 ctx.fillStyle="pink";
 ctx.beginPath();
 ctx.arc(x-5, player.y+25, 6, 0, Math.PI*2);
 ctx.fill();
}

/* OBSTÁCULOS */
function drawObstacles(){
 for(let o of obstacles){
  let x = lanes[o.lane];

  ctx.fillStyle="#ff8fab";
  ctx.beginPath();
  ctx.arc(x, o.y, 15, 0, Math.PI*2);
  ctx.fill();

  o.y += speed;

  if(o.y > canvas.height){
   obstacles.shift();
  }

  if(
   Math.abs(x - lanes[lane]) < 30 &&
   o.y > player.y &&
   o.y < player.y + 40
  ){
   alert("perdiste 😭");
   location.reload();
  }
 }
}

/* UPDATE */
function update(){
 distance++;

 if(distance % 100 === 0){
  spawnObstacle();
 }

 if(distance % 2000 === 0){
  level++;
  showMessage();
 }

 player.vy += 0.8;
 player.y += player.vy;

 if(player.y >= canvas.height-150){
  player.y = canvas.height-150;
  player.jumping=false;
 }

 speed += 0.001;
}

/* MENSAJES */
function showMessage(){
 const overlay = document.getElementById("overlay");
 overlay.classList.remove("hidden");

 if(level==2){
  overlay.innerHTML = `<h2>El tiempo pasa rápido... pero si estoy contigo no me molestaría mirarte hasta que el universo entero empiece a envejecer 💙</h2>`;
 }
 else if(level==3){
  overlay.innerHTML = `<h2>ya falta poco para tu regalo... será lindo? 🎁</h2>`;
 }
 else{
  finalScreen();
  return;
 }

 setTimeout(()=>overlay.classList.add("hidden"),4000);
}

/* FINAL */
function finalScreen(){
 const overlay = document.getElementById("overlay");
 overlay.innerHTML = `
 <button onclick="openLetter()">continuar?</button>
 <button onclick="location.reload()">salir</button>
 `;
}

/* CARTA */
function openLetter(){
 const overlay = document.getElementById("overlay");

 overlay.innerHTML = `
 <div class="envelope">
  <div class="heart" onclick="showLetter()">💌</div>
 </div>
 `;
}

function showLetter(){
 const overlay = document.getElementById("overlay");

 overlay.innerHTML = `
 <div class="letter">
 Sé que llevamos poco tiempo, pero me alegra muchísimo cumplir otro mes más a tu lado.<br><br>

 Nunca imaginé entrar a trabajar a ese lugar y salir de ahí con la persona que más amo.<br><br>

 Estar contigo se siente como una curita al corazón que alegra cada momento de mi vida.<br><br>

 Eres una persona muy bella aunque tu no te lo creas, bello por dentro y por fuera.<br><br>

 Si pudiera te meteria en mi bolsillo y te llevaría siempre conmigo para cuidarte de lo que sea.<br><br>

 No existen palabras suficientes para decir cuánto te amo, mi querido John.
 </div>
 `;
}

/* LOOP */
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawBackground();
 update();
 drawPlayer();
 drawObstacles();

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
