<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Love Game 💙</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Courier New', monospace;
  background:#000;
}

canvas{
  display:block;
}

/* Botones móviles */
.controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffffffaa;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  user-select:none;
}

/* Pantallas */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  flex-direction:column;
  padding:20px;
}

/* Carta */
.envelope{
  width:200px;
  height:140px;
  background:#e8d5b7;
  border-radius:10px;
  position:relative;
}

.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="left">⬅️</div>
  <div class="btn" id="jump">⬆️</div>
  <div class="btn" id="right">➡️</div>
</div>

<div id="overlay" class="screen" style="display:none;"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ====== PLAYER ====== */
let player = {
  x:100,
  y:300,
  w:40,
  h:40,
  vy:0,
  jumping:false
};

let gravity = 0.8;
let level = 1;
let obstacles = [];
let flag = {x:2000,y:300};

/* ===== CONTROLES ===== */
let keys = {left:false,right:false};

document.getElementById("left").ontouchstart = ()=>keys.left=true;
document.getElementById("left").ontouchend = ()=>keys.left=false;

document.getElementById("right").ontouchstart = ()=>keys.right=true;
document.getElementById("right").ontouchend = ()=>keys.right=false;

document.getElementById("jump").ontouchstart = ()=>{
  if(!player.jumping){
    player.vy = -15;
    player.jumping = true;
  }
};

/* ===== FONDOS ===== */
function drawBackground(){
  if(level==1){
    ctx.fillStyle="#7ec850"; // bosque
  }
  if(level==2){
    ctx.fillStyle="#e89c4f"; // otoño
  }
  if(level==3){
    ctx.fillStyle="#1a1a3a"; // noche
  }
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== DINO ===== */
function drawPlayer(){
  ctx.fillStyle="#4da6ff";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  ctx.fillStyle="white";
  ctx.fillRect(player.x+5,player.y+5,10,10);

  if(level==2){
    ctx.fillStyle="green";
    ctx.fillRect(player.x,player.y-10,40,10); // gorro
  }
}

/* ===== OBSTÁCULOS ===== */
function generateObstacles(){
  obstacles=[];
  for(let i=1;i<10;i++){
    obstacles.push({
      x:i*300+300,
      y:300,
      w:30,
      h:30
    });
  }
}

/* ===== UPDATE ===== */
function update(){
  if(keys.left) player.x-=5;
  if(keys.right) player.x+=5;

  player.vy += gravity;
  player.y += player.vy;

  if(player.y>300){
    player.y=300;
    player.jumping=false;
  }

  // colisiones
  for(let o of obstacles){
    if(player.x < o.x+o.w &&
       player.x+player.w > o.x &&
       player.y < o.y+o.h &&
       player.y+player.h > o.y){
        alert("Perdiste 😭");
        location.reload();
    }
  }

  // bandera
  if(player.x > flag.x){
    nextLevel();
  }
}

/* ===== DRAW ===== */
function draw(){
  drawBackground();

  // suelo
  ctx.fillStyle="#3b7d2a";
  ctx.fillRect(0,340,canvas.width,100);

  // obstáculos
  ctx.fillStyle="brown";
  for(let o of obstacles){
    ctx.fillRect(o.x,o.y,o.w,o.h);
  }

  // bandera
  ctx.fillStyle="red";
  ctx.fillRect(flag.x,260,20,80);

  drawPlayer();
}

/* ===== LOOP ===== */
function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

/* ===== NIVELES ===== */
function nextLevel(){
  const overlay = document.getElementById("overlay");

  if(level==1){
    overlay.style.display="flex";
    overlay.innerHTML=`<h2>El tiempo pasa rápido...<br>pero contigo no importa 💙<br><br>Nivel 2</h2>`;
    setTimeout(()=>{
      overlay.style.display="none";
      level=2;
      player.x=100;
      generateObstacles();
    },3000);
  }

  else if(level==2){
    overlay.style.display="flex";
    overlay.innerHTML=`<h2>Ya falta poco para tu regalo 🎁<br><br>Nivel 3</h2>`;
    setTimeout(()=>{
      overlay.style.display="none";
      level=3;
      player.x=100;
      generateObstacles();
    },3000);
  }

  else if(level==3){
    showFinal();
  }
}

/* ===== FINAL ===== */
function showFinal(){
  const overlay = document.getElementById("overlay");
  overlay.style.display="flex";

  overlay.innerHTML=`
  <h2>💖</h2>
  <button onclick="continueGame()">Continuar</button>
  <button onclick="location.reload()">Salir</button>
  `;
}

function continueGame(){
  const overlay = document.getElementById("overlay");

  overlay.innerHTML=`
  <div class="envelope">
    <div class="heart" onclick="openLetter()">💌</div>
  </div>
  `;
}

function openLetter(){
  const overlay = document.getElementById("overlay");

  overlay.innerHTML=`
  <p style="font-style:italic; font-size:18px;">
  Sé que llevamos poco tiempo, pero me alegra muchísimo cumplir otro mes más a tu lado.<br><br>
  Nunca imaginé entrar a trabajar a ese lugar y salir con la persona que más amo.<br><br>
  Estar contigo se siente como una curita al corazón 💙<br><br>
  Te amo, mi querido John.
  </p>
  `;
}

/* INIT */
generateObstacles();
gameLoop();
</script>

</body>
</html>
